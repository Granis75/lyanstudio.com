<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Lyan Studio Open Graph image</title>
  <desc id="desc">Dark premium Open Graph image for Lyan Studio with React delivery support text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.48" stop-color="#080b12"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="6%" r="65%">
      <stop offset="0" stop-color="#5d87ff" stop-opacity="0.32"/>
      <stop offset="0.52" stop-color="#5d87ff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#5d87ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="92%" cy="14%" r="52%">
      <stop offset="0" stop-color="#f8fafc" stop-opacity="0.16"/>
      <stop offset="0.58" stop-color="#f8fafc" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#f8fafc" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <path d="M78 96 H1122 V534 H78 Z" fill="none" stroke="#f8fafc" stroke-opacity="0.12" stroke-width="1.5"/>
  <path d="M102 120 H1098 V510 H102 Z" fill="#ffffff" fill-opacity="0.035" stroke="#f8fafc" stroke-opacity="0.1" stroke-width="1"/>

  <g filter="url(#softShadow)">
    <rect x="136" y="142" width="72" height="72" rx="20" fill="#f8fafc"/>
    <text x="172" y="192" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="900" fill="#080b12">L</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="136" y="300" font-size="88" font-weight="850" letter-spacing="-3" fill="#f8fafc">Lyan Studio</text>
    <text x="140" y="374" font-size="39" font-weight="700" letter-spacing="-0.6" fill="#dbe4f0">React delivery support</text>
    <text x="140" y="444" font-size="27" font-weight="750" letter-spacing="1.8" fill="#a9b4c5">Dashboards · Portals · Internal tools</text>
  </g>

  <g fill="none" stroke="#f8fafc" stroke-opacity="0.16" stroke-width="1.5">
    <path d="M820 196 H1014"/>
    <path d="M872 244 H1064"/>
    <path d="M788 292 H984"/>
    <circle cx="820" cy="196" r="5" fill="#f8fafc" fill-opacity="0.42" stroke="none"/>
    <circle cx="1014" cy="196" r="5" fill="#f8fafc" fill-opacity="0.24" stroke="none"/>
    <circle cx="872" cy="244" r="5" fill="#f8fafc" fill-opacity="0.32" stroke="none"/>
    <circle cx="1064" cy="244" r="5" fill="#f8fafc" fill-opacity="0.2" stroke="none"/>
    <circle cx="788" cy="292" r="5" fill="#f8fafc" fill-opacity="0.22" stroke="none"/>
    <circle cx="984" cy="292" r="5" fill="#f8fafc" fill-opacity="0.3" stroke="none"/>
  </g>

  <path d="M136 494 H536" stroke="#f8fafc" stroke-opacity="0.22" stroke-width="1.5"/>
</svg>
